# Small N2 sample input for scripts/n2_cas_scan.py

[run]
# Choose one of: ccik, ccik_thick, ccik_stochastic
method = "ccik_stochastic"

[molecule]
basis = "sto-3g"
unit = "Angstrom"
charge = 0
spin = 0
verbose = 0

[scan]
R_min = 1.10
R_max = 1.10
n_points = 1

[cas]
ncas = 6
nelecas = 6
ncore = 4

[ccik]
m = 20
nadd = 200
nkeep = 2000
Kv = 400
orth_tol = 1e-12
verbose = false

[ccik_thick]
m_cycle = 20
ncycles = 1
nroot = 3
tol = 1e-8
nadd = 200
nkeep = 2000
Kv = 400
orth_tol = 1e-12
verbose = false

[ccik_stochastic]
m = 20
nadd = 200
nkeep = 2000
Kv = 400
n_walkers = 5000
seed = 0
parent_power = 1.0
p_double = 0.6
mixed_double_weight = 1.0
eps_denom = 1e-12
orth_tol = 1e-12
verbose = false
