site_name: "CompressK / ccik"
site_description: "Compressed Krylov + selected-configuration matvecs (CCIK family) and related variants"
repo_url: "https://github.com/asthanaa/CompressK"
repo_name: "asthanaa/CompressK"
edit_uri: "edit/main/docs/"

# Produce /page.html style URLs (closer to the link style you referenced).
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Algorithms: algorithms.md
  - Architecture: architecture.md
  - API: api.md
  - Development: development.md
  - Legacy: legacy.md
