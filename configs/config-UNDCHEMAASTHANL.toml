# Alternate N2 configuration with thick-restart and stochastic CCIK enabled.

[run]
methods = ["ccik_stochastic", "ccik_thick"]

[molecule]
basis = "6-31g"
unit = "Angstrom"
charge = 0
spin = 0
verbose = 0

[scan]
R_min = 1.0
R_max = 5.0
n_points = 20

[cas]
ncas = 10
nelecas = 10
ncore = 2

[ccik]
m = 100
nadd = 5000
nkeep = 10000
Kv = 5000
orth_tol = 1e-12
verbose = false

[ccik_thick]
m_cycle = 25
ncycles = 1
nroot = 5
tol = 1e-6
nadd = 5000
nkeep = 10000
Kv = 5000
orth_tol = 1e-12
verbose = false

[ccik_stochastic]
m = 50
nadd = 5000
nkeep = 10000
Kv = 5000
n_walkers = 100000
seed = 0
parent_power = 1.0
p_double = 0.6
mixed_double_weight = 1.0
eps_denom = 1e-12
orth_tol = 1e-12
verbose = false
